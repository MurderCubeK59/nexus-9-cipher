<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>NEXUS-9 Cipher Encoder</title>
<link rel="icon" href="assets/icon.png">

<style>
body {
    background:#0b0b0b;
    color:#00ffcc;
    font-family:monospace;
    padding:20px;
}

textarea, input {
    width:100%;
    background:#111;
    color:#00ffcc;
    border:1px solid #333;
    padding:10px;
    font-size:14px;
    margin-bottom:10px;
}

textarea {
    height:120px;
}

button {
    margin:5px 5px 5px 0;
    padding:10px;
    background:#111;
    color:#00ffcc;
    border:1px solid #333;
    cursor:pointer;
}

#out {
    margin-top:15px;
    white-space:pre-wrap;
    background:#111;
    padding:10px;
    border:1px solid #333;
}
</style>
</head>

<body>

<h2>🔐 NEXUS-9 Cipher</h2>

<!-- PASSWORD FIELD -->
<input type="password" id="pass" placeholder="Enter system password...">

<textarea id="input" placeholder="Type emojis, symbols, text..."></textarea>

<button onclick="encode()">ENCODE</button>
<button onclick="decode()">DECODE</button>
<button onclick="copyOut()">COPY OUTPUT</button>

<div id="out"></div>

<script>

const SYSTEM_PASSWORD = "iL0veSalm0n";

const emojis = [" "," "," "," "," "];

// ---------------- PASSWORD CHECK ----------------
function checkPassword(){
    let p = document.getElementById("pass").value;
    if(p !== SYSTEM_PASSWORD){
        document.getElementById("out").innerText = "ACCESS DENIED ❌ WRONG PASSWORD";
        return false;
    }
    return true;
}

// 1 Unicode safe normalize
const UNI6 = s => s.normalize("NFKC");

// 2 Base64 UTF-8 safe
function toBase64(str){
    return btoa(unescape(encodeURIComponent(str)));
}
function fromBase64(str){
    return decodeURIComponent(escape(atob(str)));
}

// 3 Symbol shift
function SSC6(str, enc=true){
    const key = 7;
    return [...str].map(c=>{
        let code = c.codePointAt(0);
        return String.fromCodePoint(enc ? code + key : code - key);
    }).join("");
}

// 4 Block reverse
function BRE6(str){
    let size = 4;
    let out = "";
    for(let i=0;i<str.length;i+=size){
        let block = str.slice(i,i+size);
        out += block.split("").reverse().join("");
    }
    return out;
}

// 5 Emoji injector (auto removable)
function ENI6(str, enc=true){
    if(enc){
        let out = "";
        for(let i=0;i<str.length;i++){
            out += str[i];
            if(i % 5 === 0) out += emojis[i % emojis.length];
        }
        return out;
    } else {
        return str.replace(/[\u{1F300}-\u{1FAFF}]/gu,"");
    }
}

// 6 Hex finalizer
function HMF6(str, enc=true){
    if(enc){
        return [...str].map(c=>c.codePointAt(0).toString(16)).join("-");
    } else {
        return str.split("-")
        .map(h=>String.fromCodePoint(parseInt(h,16)))
        .join("");
    }
}

// ---------------- ENCODE ----------------
function encode(){
    if(!checkPassword()) return;

    let t = document.getElementById("input").value;

    let r = UNI6(t);
    r = toBase64(r);
    r = SSC6(r,true);
    r = BRE6(r);
    r = ENI6(r,true);
    r = HMF6(r,true);

    document.getElementById("out").innerText = r;
}

// ---------------- DECODE ----------------
function decode(){
    if(!checkPassword()) return;

    let t = document.getElementById("input").value;

    let r = HMF6(t,false);
    r = ENI6(r,false);
    r = BRE6(r);
    r = SSC6(r,false);
    r = fromBase64(r);
    r = UNI6(r);

    document.getElementById("out").innerText = r;
}

// ---------------- COPY OUTPUT ----------------
function copyOut(){
    let text = document.getElementById("out").innerText;

    navigator.clipboard.writeText(text).then(()=>{
        document.getElementById("out").innerText += "\n\nCOPIED ✔";
    });
}

</script>

</body>
</html>
