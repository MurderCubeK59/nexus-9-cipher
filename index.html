<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>NEXUS-9 Cipher Encoder</title>
<link rel="icon" href="assets/icon.png">

<style>
body {
    background:#0b0b0b;
    color:#00ffcc;
    font-family:monospace;
    padding:20px;
}

textarea {
    width:100%;
    height:120px;
    background:#111;
    color:#00ffcc;
    border:1px solid #333;
    padding:10px;
    font-size:14px;
}

button {
    margin:5px;
    padding:10px;
    background:#111;
    color:#00ffcc;
    border:1px solid #333;
    cursor:pointer;
}

#out {
    margin-top:15px;
    white-space:pre-wrap;
    background:#111;
    padding:10px;
    border:1px solid #333;
}
</style>
</head>

<body>

<h2>🔐 NEXUS-6 Cipher (Emoji Safe)</h2>

<textarea id="input" placeholder="Type emojis, symbols, text..."></textarea>
<br>

<button onclick="encode()">ENCODE</button>
<button onclick="decode()">DECODE</button>

<div id="out"></div>

<script>

const emojis = ["🔥","⚡","🧿","💠","🌀"];

// 1 Unicode safe normalize
const UNI6 = s => s.normalize("NFKC");

// 2 UTF8 Base64 safe encode/decode
function toBase64(str){
    return btoa(unescape(encodeURIComponent(str)));
}
function fromBase64(str){
    return decodeURIComponent(escape(atob(str)));
}

// 3 Symbol shift (Unicode safe)
function SSC6(str, enc=true){
    const key = 7;
    return [...str].map(c=>{
        let code = c.codePointAt(0);
        return String.fromCodePoint(enc ? code + key : code - key);
    }).join("");
}

// 4 Block reverse
function BRE6(str, enc=true){
    let size = 4;
    let out = "";
    for(let i=0;i<str.length;i+=size){
        let block = str.slice(i,i+size);
        out += block.split("").reverse().join("");
    }
    return out;
}

// 5 Emoji injector
function ENI6(str, enc=true){
    if(enc){
        let out = "";
        for(let i=0;i<str.length;i++){
            out += str[i];
            if(i % 5 === 0) out += emojis[i % emojis.length];
        }
        return out;
    } else {
        return str.replace(/[\u{1F300}-\u{1FAFF}]/gu,"");
    }
}

// 6 Hex finalizer
function HMF6(str, enc=true){
    if(enc){
        return [...str].map(c=>c.codePointAt(0).toString(16)).join("-");
    } else {
        return str.split("-").map(h=>String.fromCodePoint(parseInt(h,16))).join("");
    }
}

// ---------------- ENCODE ----------------
function encode(){
    let t = document.getElementById("input").value;

    let r = UNI6(t);
    r = toBase64(r);
    r = SSC6(r,true);
    r = BRE6(r,true);
    r = ENI6(r,true);
    r = HMF6(r,true);

    document.getElementById("out").innerText = r;
}

// ---------------- DECODE ----------------
function decode(){
    let t = document.getElementById("input").value;

    let r = HMF6(t,false);
    r = ENI6(r,false);
    r = BRE6(r,false);
    r = SSC6(r,false);
    r = fromBase64(r);
    r = UNI6(r);

    document.getElementById("out").innerText = r;
}

</script>

</body>
</html>
