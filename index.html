<body>

<div id="loginBox">
    <h2>🔐 NEXUS-9 ACCESS TERMINAL</h2>
    <input type="password" id="pass" placeholder="Enter Access Key">
    <button onclick="login()">LOGIN</button>

    <h2>🧠 NEXUS-9 CIPHER CORE</h2>

    <textarea id="input" placeholder="Enter text / emojis / symbols"></textarea>

    <button onclick="encode()">ENCODE</button>
    <button onclick="decode()">DECODE</button>
    <button onclick="copyOut()">COPY</button>

    <div id="out"></div>
</div>

<script src="config.js"></script>
<script src="script.js"></script>
</body>
