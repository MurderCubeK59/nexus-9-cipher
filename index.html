<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>NEXUS-9 Cipher Encoder</title>
<link rel="icon" href="assets/icon.png">

<style>
body {
    background:#0b0b0b;
    color:#00ffcc;
    font-family:monospace;
    padding:20px;
}

textarea {
    width:100%;
    height:120px;
    background:#111;
    color:#00ffcc;
    border:1px solid #333;
    padding:10px;
}

button {
    margin-top:10px;
    padding:10px;
    background:#111;
    color:#00ffcc;
    border:1px solid #333;
    cursor:pointer;
}

#out {
    margin-top:15px;
    white-space:pre-wrap;
    background:#111;
    padding:10px;
    border:1px solid #333;
}
</style>
</head>

<body>

<h2>NEXUS-9 Cipher (Fixed Build)</h2>

<textarea id="input" placeholder="Enter text..."></textarea>
<br>

<button onclick="encode()">ENCODE</button>
<button onclick="decode()">DECODE</button>

<div id="out"></div>

<script>
// 1 sanitize
function ISC9(s){ return s.normalize("NFKC"); }

// 2 simple substitution
function SSM9(s, enc=true){
    const map = { a:"@", b:"8", c:"(", d:"|)", e:"3", f:"ph", g:"9", h:"#", i:"!", o:"0", s:"$", t:"7" };
    const rev = Object.fromEntries(Object.entries(map).map(([k,v])=>[v,k]));

    if(enc){
        return [...s.toLowerCase()].map(c=>map[c]||c).join("");
    } else {
        let out="";
        for(let i=0;i<s.length;i++){
            let found=false;
            for(let k in rev){
                if(s.startsWith(k,i)){
                    out+=rev[k];
                    i+=k.length-1;
                    found=true;
                    break;
                }
            }
            if(!found) out+=s[i];
        }
        return out;
    }
}

// 3 reverse
const SRE9 = s => s.split("").reverse().join("");

// 4 base64
const BTL9 = (s,enc=true)=> enc ? btoa(s) : atob(s);

// 5 XOR
function BSI9(s){
    const key=23;
    return [...s].map(c=>String.fromCharCode(c.charCodeAt(0)^key)).join("");
}

// 6 shuffle (deterministic)
function shuffle(s){
    let a=s.split("");
    for(let i=a.length-1;i>0;i--){
        let j=(i*7+3)%a.length;
        [a[i],a[j]]=[a[j],a[i]];
    }
    return a.join("");
}

// 7 noise
const NIF9 = (s,enc=true)=> enc ? s.split("").join("·") : s.replace(/·/g,"");

// 8 checksum
function CLE9(s,enc=true){
    if(enc){
        let h=0;
        for(let c of s) h+=c.charCodeAt(0);
        return s+"::"+h;
    } else {
        return s.split("::")[0];
    }
}

// 9 hex
function FCM9(s,enc=true){
    if(enc){
        return [...s].map(c=>c.charCodeAt(0).toString(16)).join("-");
    } else {
        return s.split("-").map(x=>String.fromCharCode(parseInt(x,16))).join("");
    }
}

// ---------------- ENCODE ----------------
function encode(){
    let t=document.getElementById("input").value;

    let r = ISC9(t);
    r = SSM9(r,true);
    r = SRE9(r);
    r = BTL9(r,true);
    r = BSI9(r);
    r = shuffle(r);
    r = NIF9(r,true);
    r = CLE9(r,true);
    r = FCM9(r,true);

    document.getElementById("out").innerText=r;
}

// ---------------- DECODE ----------------
function decode(){
    let t=document.getElementById("input").value;

    let r = FCM9(t,false);
    r = CLE9(r,false);
    r = NIF9(r,false);
    r = shuffle(r); // NOTE: same function (deterministic demo)
    r = BSI9(r);
    r = BTL9(r,false);
    r = SRE9(r);
    r = SSM9(r,false);
    r = ISC9(r);

    document.getElementById("out").innerText=r;
}
</script>

</body>
</html>
